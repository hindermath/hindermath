name: Update Profile MOTD

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-motd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Update README MOTD
        run: |
          python3 - <<'PY'
          import hashlib
          import pathlib
          from datetime import datetime, timezone

          repo_root = pathlib.Path.cwd()
          readme_path = repo_root / "README.md"
          messages_path = repo_root / ".github" / "motd" / "messages.txt"

          if not readme_path.exists():
              raise SystemExit(f"README.md not found: {readme_path}")
          if not messages_path.exists():
              raise SystemExit(f"messages.txt not found: {messages_path}")

          messages = [
              line.strip()
              for line in messages_path.read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          if not messages:
              raise SystemExit("No MOTD entries found")

          seed = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          digest = hashlib.sha256(seed.encode("utf-8")).hexdigest()
          index = int(digest[:8], 16) % len(messages)
          entry = messages[index]

          if " || " not in entry:
              raise SystemExit(f"Invalid MOTD entry format at index {index}: {entry}")

          de_message, en_message = entry.split(" || ", 1)
          block = "\n".join([
              "<!-- MOTD:START -->",
              "> **MOTD / Message of the Day**",
              ">",
              f"> {de_message}",
              ">",
              f"> {en_message}",
              "<!-- MOTD:END -->",
          ])

          content = readme_path.read_text(encoding="utf-8")
          start = "<!-- MOTD:START -->"
          end = "<!-- MOTD:END -->"

          if start in content and end in content:
              start_index = content.index(start)
              end_index = content.index(end) + len(end)
              updated = content[:start_index] + block + content[end_index:]
          else:
              updated = content.rstrip() + "\n\n" + block + "\n"

          readme_path.write_text(updated, encoding="utf-8")
          print(f"Updated MOTD index {index} of {len(messages)}")
          PY

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update profile motd"
          git push
